upstream crm_backend {
    server unix:///run/uwsgi/crm.sock;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 12M;

    # Django API and admin
    location /api/ {
        uwsgi_pass crm_backend;
        include uwsgi_params;
    }

    location /admin/ {
        uwsgi_pass crm_backend;
        include uwsgi_params;
    }

    # Django static files (collectstatic output)
    location /static/ {
        alias /opt/app/jvl/crm-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded media files
    location /media/ {
        alias /opt/app/data/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Frontend hashed assets — long-lived immutable cache
    location /assets/ {
        root /opt/app/jvl/crm-frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA — serve index.html for all other routes
    location / {
        root /opt/app/jvl/crm-frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
