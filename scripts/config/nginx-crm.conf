upstream crm_backend {
    server unix:///run/uwsgi/crm.sock;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name app.jvlcomunicacoes.com;

    return 301 https://$host$request_uri;
}

# Allow direct IP access over HTTP (for health checks, internal use)
server {
    listen 80;
    server_name 134.209.11.176;

    client_max_body_size 27M;

    location /api/ {
        uwsgi_pass crm_backend;
        include uwsgi_params;
        uwsgi_read_timeout 120;
        uwsgi_send_timeout 120;
    }

    location /admin/ {
        uwsgi_pass crm_backend;
        include uwsgi_params;
    }

    location /static/ {
        alias /opt/app/jvl/crm-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/app/data/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /assets/ {
        root /opt/app/jvl/crm-frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /opt/app/jvl/crm-frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name app.jvlcomunicacoes.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/app.jvlcomunicacoes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.jvlcomunicacoes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 27M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Django API and admin
    location /api/ {
        uwsgi_pass crm_backend;
        include uwsgi_params;
        uwsgi_param X-Forwarded-Proto $scheme;
        uwsgi_read_timeout 120;
        uwsgi_send_timeout 120;
    }

    location /admin/ {
        uwsgi_pass crm_backend;
        include uwsgi_params;
        uwsgi_param X-Forwarded-Proto $scheme;
    }

    # Django static files (collectstatic output)
    location /static/ {
        alias /opt/app/jvl/crm-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded media files
    location /media/ {
        alias /opt/app/data/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Frontend hashed assets — long-lived immutable cache
    location /assets/ {
        root /opt/app/jvl/crm-frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA — serve index.html for all other routes
    location / {
        root /opt/app/jvl/crm-frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
