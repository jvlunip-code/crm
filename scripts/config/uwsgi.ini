[uwsgi]
chdir = /opt/app/jvl/crm-backend
module = config.wsgi:application
home = /opt/app/jvl/crm-backend/.venv

# Socket
socket = /run/uwsgi/crm.sock
chmod-socket = 660

# Processes and threads
processes = 4
threads = 2
enable-threads = true

# Process management
master = true
vacuum = true
die-on-term = true
need-app = true

# Systemd integration
notify-socket = %(NOTIFY_SOCKET)

# Limits
harakiri = 60
max-requests = 5000

# Logging
logto = /var/log/uwsgi/crm.log
log-date = true

# Graceful reload
lazy-apps = true
